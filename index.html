<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Media Converter Pro</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-top: 0; }
        input[type="file"] { display: none; }
        .upload-label { display: block; background: #334155; padding: 20px; border: 2px dashed #38bdf8; border-radius: 10px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .upload-label:hover { background: #475569; }
        .status { margin: 15px 0; font-size: 14px; color: #94a3b8; }
        #downloadLink { display: none; background: #22c55e; color: white; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        .loader { width: 100%; height: 5px; background: #0f172a; border-radius: 5px; overflow: hidden; display: none; }
        .progress { width: 0%; height: 100%; background: #38bdf8; transition: 0.2s; }
    </style>
</head>
<body>

<div class="card">
    <h2>Audio Extractor</h2>
    <p>Videoni tanlang va undan MP3 (Audio) ajratib oling</p>
    
    <label for="videoFile" class="upload-label">
        <span id="fileName">Videonshuni bosing va yuklang</span>
    </label>
    <input type="file" id="videoFile" accept="video/*">

    <div class="loader" id="loader"><div class="progress" id="progress"></div></div>
    <div id="status" class="status">Tayyor.</div>
    
    <a id="downloadLink">AUDIONI YUKLAB OLISH (.wav)</a>
</div>

<script>
    const fileInput = document.getElementById('videoFile');
    const status = document.getElementById('status');
    const progress = document.getElementById('progress');
    const loader = document.getElementById('loader');
    const downloadLink = document.getElementById('downloadLink');

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('fileName').innerText = file.name;
        status.innerText = "Video ishlanmoqda... Kuting.";
        loader.style.display = "block";
        downloadLink.style.display = "none";

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const reader = new FileReader();

        reader.onload = async (event) => {
            const arrayBuffer = event.target.result;
            
            audioCtx.decodeAudioData(arrayBuffer, (audioBuffer) => {
                const wavBlob = bufferToWave(audioBuffer, audioBuffer.length);
                const url = URL.createObjectURL(wavBlob);
                
                progress.style.width = "100%";
                status.innerText = "Tamomlandi! Audio tayyor.";
                downloadLink.href = url;
                downloadLink.download = file.name.split('.')[0] + ".wav";
                downloadLink.style.display = "block";
            });
        };

        reader.readAsArrayBuffer(file);
    };

    // Audio buferni faylga aylantirish funksiyasi
    function bufferToWave(abuffer, len) {
        let numOfChan = abuffer.numberOfChannels,
            length = len * numOfChan * 2 + 44,
            buffer = new ArrayBuffer(length),
            view = new DataView(buffer),
            channels = [], i, sample,
            offset = 0,
            pos = 0;

        setUint32(0x46464952);                         
        setUint32(length - 8);                         
        setUint32(0x45564157);                         
        setUint32(0x20746d66);                         
        setUint32(16);                                 
        setUint16(1);                                  
        setUint16(numOfChan);
        setUint32(abuffer.sampleRate);
        setUint32(abuffer.sampleRate * 2 * numOfChan); 
        setUint16(numOfChan * 2);                      
        setUint16(16);                                 
        setUint32(0x61746164);                         
        setUint32(length - pos - 4);                   

        for(i = 0; i < abuffer.numberOfChannels; i++)
            channels.push(abuffer.getChannelData(i));

        while(pos < length) {
            for(i = 0; i < numOfChan; i++) {             
                sample = Math.max(-1, Math.min(1, channels[i][offset])); 
                sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0; 
                view.setInt16(pos, sample, true);          
                pos += 2;
            }
            offset++;                                     
        }

        return new Blob([buffer], {type: "audio/wav"});

        function setUint16(data) {
            view.setUint16(pos, data, true);
            pos += 2;
        }

        function setUint32(data) {
            view.setUint32(pos, data, true);
            pos += 4;
        }
    }
</script>

</body>
</html>
